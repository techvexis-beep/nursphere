name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild (generate native Android project)
        run: npx expo prebuild --platform android --no-install

      - name: Patch Android build config for JS bundle embedding
        run: |
          # Ensure bundleInRelease=true so JS bundle is embedded in APK
          sed -i 's/^android {/project.ext.react = [\n    entryFile: "index.js",\n    bundleInDebug: true,\n    bundleInRelease: true,\n    enableHermes: true\n]\n\nandroid {/' android/app/build.gradle

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Verify APK contains JS bundle
        run: |
          APK=$(ls android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "No APK found!"; exit 1; fi
          echo "APK found: $APK ($(du -h $APK | cut -f1))"
          # Check if bundle is inside (unzip and look for bundle)
          unzip -l $APK | grep -E "\.(bundle|hbc)" && echo "JS bundle embedded!" || echo "WARNING: No JS bundle found in APK!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nursphere-apk
          path: android/app/build/outputs/apk/debug/*.apk
