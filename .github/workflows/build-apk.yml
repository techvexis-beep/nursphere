name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild (generates android/)
        run: npx expo prebuild --platform android --clean

      - name: Create local.properties
        run: |
          mkdir -p android/app
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Export and copy JS bundle for Android
        run: |
          npx expo export --platform android --output-dir dist-android
          mkdir -p android/app/src/main/assets
          if [ -f dist-android/android-index.bundle ]; then
            cp dist-android/android-index.bundle android/app/src/main/assets/index.android.bundle
            echo "Copied android-index.bundle"
          elif [ -f dist-android/android-index.hbc ]; then
            cp dist-android/android-index.hbc android/app/src/main/assets/index.android.hbc
            echo "Copied android-index.hbc"
          elif [ -d dist-android/_expo ]; then
            find dist-android/_expo -type f \( -name "*.bundle" -o -name "*.hbc" \) -exec cp {} android/app/src/main/assets/ \;
            echo "Copied from _expo"
          else
            echo "Dist contents:" && ls -laR dist-android/
          fi

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -x lint

      - name: Verify APK has JS bundle
        run: |
          APK=$(ls android/app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          echo "APK: $APK ($(du -h $APK | cut -f1))"
          unzip -l $APK 2>/dev/null | grep -E "\.(bundle|hbc|assets)" | head -10
          echo "---"
          unzip -l $APK 2>/dev/null | head -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nursphere-apk
          path: android/app/build/outputs/apk/debug/*.apk
