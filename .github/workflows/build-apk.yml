name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS for Android
        run: |
          npx react-native bundle --platform android --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Verify APK has JS bundle
        run: |
          APK=$(ls android/app/build/outputs/apk/debug/*.apk | head -1)
          echo "APK: $APK ($(du -h $APK | cut -f1))"
          unzip -l $APK | grep -E "\.(bundle|hbc)" && echo "JS BUNDLE EMBEDDED!" || echo "WARNING: No bundle!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nursphere-apk
          path: android/app/build/outputs/apk/debug/*.apk
